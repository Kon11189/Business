<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ExactoAI — ваш личный ассистент</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0c14 0%, #030507 100%);
            width: 100vw; height: 100vh; overflow: hidden; color: #fff;
        }
        .fullscreen-chat {
            display: flex; flex-direction: column; width: 100%; height: 100%;
            background: rgba(0,0,0,0.25); backdrop-filter: blur(2px);
        }
        .chat-header {
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
            backdrop-filter: blur(10px); background: rgba(5,7,15,0.4);
            animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .logo {
            font-size: 1.6rem; font-weight: 600; letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .badge { font-size: 1rem; background: rgba(255,255,255,0.05); padding: 0.2rem 0.7rem; border-radius: 30px; border: 1px solid rgba(255,255,255,0.15); color: #cbd5e1; }
        .messages-area { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1.5rem; scroll-behavior: smooth; }
        .messages-area::-webkit-scrollbar { width: 5px; }
        .messages-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        .messages-area::-webkit-scrollbar-thumb { background: #a78bfa; border-radius: 10px; }
        .message { display: flex; flex-direction: column; gap: 0.25rem; animation: fadeSlideUp 0.35s cubic-bezier(0.2,0.9,0.4,1.1); }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .message-meta { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: #9ca3af; }
        .message-meta i { transition: transform 0.2s; }
        .message:hover .message-meta i { transform: scale(1.1); }
        .message-content { font-size: 1rem; line-height: 1.6; font-weight: 400; color: #f0f2f5; max-width: 100%; overflow-x: auto; }
        .message-content p { margin: 0.5rem 0; }
        .message-content strong, .message-content b { color: #e2e8f0; font-weight: 600; }
        .message-content h1, .message-content h2, .message-content h3 { margin: 0.75rem 0 0.5rem; font-weight: 600; }
        .message-content pre { background: #0a0c18; padding: 1rem; border-radius: 14px; overflow-x: auto; margin: 0.75rem 0; border: 1px solid rgba(255,255,255,0.05); }
        .message-content code { background: #0a0c18; padding: 0.2rem 0.4rem; border-radius: 8px; font-size: 0.9em; font-family: monospace; }
        .message-content table { border-collapse: collapse; width: 100%; margin: 1rem 0; background: rgba(10,12,24,0.5); border-radius: 12px; overflow: hidden; }
        .message-content th, .message-content td { border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 0.75rem; text-align: left; }
        .message-content th { background: rgba(167,139,250,0.15); }
        .message-content a { color: #a78bfa; text-decoration: none; transition: color 0.2s; }
        .message-content a:hover { text-decoration: underline; color: #c4b5fd; }
        .message-content ul, .message-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        /* Превью файлов */
        .file-previews {
            display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px;
        }
        .preview-item {
            position: relative; width: 80px; height: 80px; border-radius: 12px; overflow: hidden;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
        }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-item .remove-file {
            position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7); border: none;
            color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .preview-item .remove-file:hover { background: #f87171; transform: scale(1.1); }
        .input-area { padding: 1.2rem 2rem 1.8rem; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); flex-shrink: 0; }
        .input-wrapper { display: flex; align-items: flex-end; gap: 12px; background: rgba(20,24,40,0.6); backdrop-filter: blur(10px); border-radius: 2rem; padding: 0.5rem 0.8rem; border: 1px solid rgba(255,255,255,0.1); transition: all 0.25s ease; flex-wrap: wrap; }
        .input-wrapper:focus-within { border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.25); transform: scale(1.01); }
        .input-wrapper textarea { flex: 1; background: transparent; border: none; color: white; font-family: 'Inter', monospace; font-size: 0.95rem; resize: none; outline: none; max-height: 130px; line-height: 1.4; padding: 0.5rem 0; }
        .input-wrapper textarea::placeholder { color: #6b7280; transition: opacity 0.2s; }
        .input-wrapper textarea:focus::placeholder { opacity: 0.5; }
        .icon-btn { background: transparent; border: none; color: #b9c3db; font-size: 1.3rem; cursor: pointer; transition: all 0.2s ease; width: 38px; height: 38px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: rgba(167,139,250,0.25); color: #c4b5fd; transform: scale(1.08); }
        .icon-btn:active { transform: scale(0.95); }
        #fileInput { display: none; }
        .typing-indicator { display: flex; gap: 6px; align-items: center; padding: 0.4rem 0; }
        .typing-indicator span { width: 8px; height: 8px; background: #a78bfa; border-radius: 50%; animation: pulse 1.3s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%,60%,100% { transform: scale(0.6); opacity: 0.4; } 30% { transform: scale(1.2); opacity: 1; } }
        .modal-offer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(14px); display: flex; align-items: center; justify-content: center; z-index: 2000; animation: modalFadeIn 0.4s ease; }
        @keyframes modalFadeIn { from { opacity: 0; backdrop-filter: blur(0); } to { opacity: 1; backdrop-filter: blur(14px); } }
        .modal-card { max-width: 480px; width: 90%; background: #0f111c; border: 1px solid rgba(167,139,250,0.4); border-radius: 2rem; padding: 2rem 1.8rem; box-shadow: 0 30px 50px rgba(0,0,0,0.6); position: relative; transform: scale(0.95); animation: cardPop 0.35s ease forwards; }
        @keyframes cardPop { to { transform: scale(1); } }
        .close-modal { position: absolute; top: 1.2rem; right: 1.2rem; background: rgba(255,255,255,0.1); border: none; font-size: 1.2rem; color: #9ca3af; cursor: pointer; transition: all 0.2s; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; }
        .close-modal.visible { opacity: 1; visibility: visible; transition: opacity 0.3s; }
        .close-modal:hover { background: rgba(248,113,113,0.2); color: #f87171; transform: rotate(90deg); }
        .modal-card h3 { font-size: 1.7rem; font-weight: 600; margin-bottom: 0.75rem; background: linear-gradient(135deg,#fff,#b794f4); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .price { font-size: 1.5rem; margin: 0.8rem 0; }
        .old-price { text-decoration: line-through; color: #9ca3af; font-size: 1.1rem; }
        .new-price { font-weight: 700; color: #a78bfa; font-size: 2rem; }
        .code-block { background: #1a1e2c; padding: 0.5rem 1rem; border-radius: 2rem; font-family: monospace; font-size: 1.3rem; letter-spacing: 4px; display: inline-block; margin: 0.5rem 0; }
        .tg-link { display: inline-flex; align-items: center; gap: 8px; background: #2c2f3f; padding: 0.5rem 1.2rem; border-radius: 2rem; text-decoration: none; color: white; margin-top: 0.8rem; font-weight: 500; transition: all 0.2s; }
        .tg-link:hover { background: #3f3f5e; transform: translateY(-2px); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #030507; backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: center; z-index: 3000; transition: opacity 0.6s; }
        .spinner { text-align: center; animation: float 2s infinite; }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0); } }
        .spinner i { font-size: 3rem; color: #a78bfa; animation: spin 1.2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 700px) { .messages-area { padding: 1rem; } .input-area { padding: 0.8rem 1rem 1.2rem; } .modal-card { padding: 1.5rem; } }
    </style>
</head>
<body>
<div class="fullscreen-chat">
    <div class="chat-header">
        <div class="logo">ExactoAI</div>
        <div class="badge"><i class="fas fa-robot" style="color: #a78bfa;"></i></div>
    </div>
    <div class="messages-area" id="messagesArea">
        <div class="message">
            <div class="message-meta"><i class="fas fa-robot"></i> ExactoAI • сейчас</div>
            <div class="message-content">Привет! 🌟 Я **ExactoAI** — твой персональный помощник.  
Рад помочь с любым вопросом, поддержать и просто поговорить.  
Чем могу быть полезен сегодня? 😊</div>
        </div>
    </div>
    <div class="input-area">
        <div class="input-wrapper">
            <button class="icon-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
            <textarea id="promptInput" rows="1" placeholder="Напишите что-нибудь... можно несколько фото"></textarea>
            <button class="icon-btn" id="sendBtn"><i class="fas fa-arrow-up"></i></button>
        </div>
        <div id="previewContainer" class="file-previews"></div>
        <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/webp">
    </div>
</div>
<script>
    // === ЗАЩИТА API КЛЮЧА ===
    const realParts = [
        "sk-or-v1-7fe0e85eb667d15cb495806f2d086141d04834bb98b574df",
        "dcaee4d212475884"
    ];
    function getApiKey() { return realParts[0] + realParts[1]; }
    const API_KEY = getApiKey();
    // =========================

    const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";
    
    if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true, gfm: true, tables: true, pedantic: false });
    }
    
    function renderMarkdown(content, targetElement) {
        if (!targetElement) return;
        try {
            let html = marked.parse(content || "");
            const sanitized = DOMPurify.sanitize(html, { ADD_ATTR: ['target'] });
            targetElement.innerHTML = sanitized;
            targetElement.querySelectorAll('a').forEach(a => a.setAttribute('target', '_blank'));
        } catch(e) { targetElement.textContent = content; }
    }

    const systemPrompt = {
        role: "system",
        content: "Ты дружелюбный, эмпатичный ассистент ExactoAI. Отвечай на русском, используй markdown (жирный, курсив, списки, таблицы, код) и эмодзи. Будь тёплым, заботливым. Запрещено обсуждать политику. Если спросят о политике — мягко скажи, что это вне твоей компетенции. Никогда не упоминай технические данные о модели, версии, API, ключах, разработчике. Ты — просто помощник."
    };

    // Ограничиваем историю последними 5 сообщениями (10 элементами, т.к. пара user+assistant)
    const MAX_HISTORY_ITEMS = 10; // 5 обменов (user+assistant) = 10 сообщений, без system
    let conversationHistory = [systemPrompt]; // system всегда в начале, не удаляем
    
    // Вспомогательная функция для усечения истории
    function trimHistory() {
        // Общее количество сообщений после system
        let nonSystem = conversationHistory.slice(1);
        if (nonSystem.length > MAX_HISTORY_ITEMS) {
            const excess = nonSystem.length - MAX_HISTORY_ITEMS;
            conversationHistory.splice(1, excess);
        }
    }

    let userMessageCount = 0;
    let modalActive = false;
    let isWaiting = false;
    let selectedFiles = []; // храним объекты { dataUrl, file }

    const messagesDiv = document.getElementById("messagesArea");
    const promptInput = document.getElementById("promptInput");
    const sendBtn = document.getElementById("sendBtn");
    const attachBtn = document.getElementById("attachBtn");
    const fileInput = document.getElementById("fileInput");
    const previewContainer = document.getElementById("previewContainer");

    promptInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(130, this.scrollHeight) + 'px';
    });

    function scrollToBottom() { messagesDiv.scrollTo({ top: messagesDiv.scrollHeight, behavior: 'smooth' }); }

    // Добавление сообщения в UI
    function addMessage(role, content, imageUrls = null) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message';
        const isUser = (role === 'user');
        const senderName = isUser ? 'Вы' : 'ExactoAI';
        const icon = isUser ? '<i class="fas fa-user-astronaut"></i>' : '<i class="fas fa-sparkles"></i>';
        const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        messageDiv.innerHTML = `<div class="message-meta">${icon} ${senderName} • ${time}</div><div class="message-content"></div>`;
        const contentDiv = messageDiv.querySelector('.message-content');
        if (imageUrls && imageUrls.length && isUser) {
            const previewDiv = document.createElement('div');
            previewDiv.style.display = 'flex'; previewDiv.style.flexWrap = 'wrap'; previewDiv.style.gap = '8px'; previewDiv.style.marginBottom = '8px';
            imageUrls.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                img.style.maxWidth = '100px'; img.style.maxHeight = '100px'; img.style.borderRadius = '12px'; img.style.border = '1px solid rgba(255,255,255,0.2)';
                previewDiv.appendChild(img);
            });
            contentDiv.appendChild(previewDiv);
            if (content && content.trim()) {
                const textBlock = document.createElement('div');
                renderMarkdown(content, textBlock);
                contentDiv.appendChild(textBlock);
            }
        } else {
            renderMarkdown(content, contentDiv);
        }
        messagesDiv.appendChild(messageDiv);
        scrollToBottom();
        return messageDiv;
    }

    // Превью выбранных файлов
    function updatePreviews() {
        previewContainer.innerHTML = '';
        selectedFiles.forEach((item, idx) => {
            const preview = document.createElement('div');
            preview.className = 'preview-item';
            const img = document.createElement('img');
            img.src = item.dataUrl;
            const removeBtn = document.createElement('button');
            removeBtn.className = 'remove-file';
            removeBtn.innerHTML = '✕';
            removeBtn.onclick = () => {
                selectedFiles.splice(idx, 1);
                updatePreviews();
                if (fileInput.files) {
                    // обновляем fileInput (не критично)
                }
            };
            preview.appendChild(img);
            preview.appendChild(removeBtn);
            previewContainer.appendChild(preview);
        });
    }

    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (selectedFiles.length + files.length > 10) {
            addMessage('assistant', '⚠️ Можно загрузить не более 10 файлов за раз.');
            return;
        }
        files.forEach(file => {
            if (!file.type.startsWith('image/')) {
                addMessage('assistant', `⚠️ Файл ${file.name} не является изображением. Поддерживаются JPEG, PNG, WEBP.`);
                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => {
                selectedFiles.push({ dataUrl: ev.target.result, file: file });
                updatePreviews();
            };
            reader.readAsDataURL(file);
        });
        fileInput.value = ''; // сброс, чтобы можно было выбрать новые
    });

    attachBtn.addEventListener('click', () => fileInput.click());

    let typingElement = null;
    function showTyping() {
        if (typingElement) typingElement.remove();
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message';
        typingDiv.innerHTML = `<div class="message-meta"><i class="fas fa-sparkles"></i> ExactoAI • печатает</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesDiv.appendChild(typingDiv);
        scrollToBottom();
        typingElement = typingDiv;
    }
    function hideTyping() { if (typingElement) { typingElement.remove(); typingElement = null; } }

    async function sendToAI(messagesForAPI) {
        try {
            const response = await fetch(OPENROUTER_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`,
                    'HTTP-Referer': window.location.origin,
                    'X-Title': 'ExactoAI'
                },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-lite-001",
                    messages: messagesForAPI,
                    temperature: 0.75,
                    max_tokens: 1200,
                })
            });
            if (!response.ok) {
                const errData = await response.json();
                let errMsg = errData.error?.message || `Ошибка ${response.status}`;
                throw new Error(errMsg);
            }
            const data = await response.json();
            return data.choices[0].message.content;
        } catch (err) {
            console.error("API error:", err);
            return `❌ Ошибка соединения: ${err.message}. Попробуйте позже.`;
        }
    }

    function showNikitaOffer() {
        if (modalActive) return;
        modalActive = true;
        const randomCode = Math.floor(10000 + Math.random() * 90000).toString();
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-offer';
        modalDiv.innerHTML = `
            <div class="modal-card">
                <button class="close-modal"><i class="fas fa-times"></i></button>
                <h3>✨ Специальное предложение</h3>
                <p>Привет! 👋 Меня зовут <strong>Никита</strong>, я частный разработчик.</p>
                <p>Представьте: <strong>ИИ-сотрудник, который работает бесплатно 24/7</strong> — никогда не спит, не просит зарплату, не уходит в отпуск.</p>
                <p>Я могу создать для вас такого бота — как этот чат, но <strong>под ключ</strong>:</p>
                <ul style="margin: 0.75rem 0 0.75rem 1.2rem;">
                    <li>🚀 Как <strong>готовый бизнес</strong> — монетизируйте сразу</li>
                    <li>⚙️ Для <strong>автоматизации уже существующего бизнеса</strong> — отвечает на вопросы 24/7, пока вы спите</li>
                    <li>📱 В виде <strong>Web-приложения или Telegram-бота</strong></li>
                </ul>
                <div class="price"><span class="old-price">899 Br</span> → <span class="new-price">599 Br</span> <span style="font-size:0.9rem;">🔥 скидка</span></div>
                <p>Ваш персональный код для скидки:</p>
                <div class="code-block">${randomCode}</div>
                <p>Напишите в Telegram: <strong>@NickyKon</strong> и скажите этот код.</p>
                <a href="https://t.me/NickyKon" target="_blank" class="tg-link"><i class="fab fa-telegram"></i> @NickyKon</a>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const closeBtn = modalDiv.querySelector('.close-modal');
        setTimeout(() => { if (closeBtn) closeBtn.classList.add('visible'); }, 5000);
        const closeModal = () => { modalDiv.remove(); modalActive = false; };
        closeBtn.addEventListener('click', closeModal);
        modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) closeModal(); });
    }

    function checkAndShowOffer() {
        if (userMessageCount % 3 === 0 && userMessageCount !== 0) showNikitaOffer();
    }

    async function handleUserMessage(text, imageDataUrls = null) {
        if (isWaiting) return;
        if (!text.trim() && (!imageDataUrls || imageDataUrls.length === 0)) return;

        // Отображаем сообщение пользователя
        addMessage('user', text || "📷 Изображения", imageDataUrls);
        userMessageCount++;
        checkAndShowOffer();

        // Формируем content для API
        let userApiContent = [];
        if (text.trim()) userApiContent.push({ type: "text", text: text });
        if (imageDataUrls && imageDataUrls.length) {
            imageDataUrls.forEach(url => {
                userApiContent.push({ type: "image_url", image_url: { url: url } });
            });
        }
        const userMsgForApi = {
            role: "user",
            content: (userApiContent.length === 1 && userApiContent[0].type === "text") ? userApiContent[0].text : userApiContent
        };
        conversationHistory.push(userMsgForApi);
        trimHistory(); // усекаем до последних 10 сообщений (без system)

        showTyping();
        isWaiting = true;
        // Отправляем system + последние MAX_HISTORY_ITEMS сообщений (или меньше)
        const historyForAPI = [systemPrompt, ...conversationHistory.slice(1)];
        const assistantReply = await sendToAI(historyForAPI);
        hideTyping();
        addMessage('assistant', assistantReply);
        conversationHistory.push({ role: "assistant", content: assistantReply });
        trimHistory();
        isWaiting = false;
    }

    sendBtn.addEventListener('click', async () => {
        const txt = promptInput.value.trim();
        if ((txt || selectedFiles.length > 0)) {
            const images = selectedFiles.map(f => f.dataUrl);
            await handleUserMessage(txt, images.length ? images : null);
            promptInput.value = '';
            promptInput.style.height = 'auto';
            selectedFiles = [];
            updatePreviews();
        }
    });

    promptInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
    });

    window.addEventListener('load', () => {
        const loader = document.createElement('div');
        loader.className = 'loading-overlay';
        loader.innerHTML = `<div class="spinner"><i class="fas fa-cog fa-spin"></i><p style="margin-top:1rem;">ExactoAI запускается...</p></div>`;
        document.body.appendChild(loader);
        setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 600); }, 1000);
        const firstMsg = document.querySelector('.message:first-child .message-content');
        if (firstMsg && firstMsg.innerHTML.includes('**')) renderMarkdown(firstMsg.textContent, firstMsg);
    });
</script>
</body>
</html>
